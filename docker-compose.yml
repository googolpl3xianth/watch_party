services:
  sync-server:
    build: ./server
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${COMPRESSED_MEDIA_FOLDER}:/media/compressed
  web-server:
    image: nginxinc/nginx-unprivileged:alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./auth:/etc/nginx/auth:ro 
      - ${COMPRESSED_MEDIA_FOLDER}:/media/compressed:ro
    security_opt:
      - no-new-privileges:true
    depends_on:
      - sync-server
    restart: unless-stopped
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=${PUID} 
      - PGID=${PGID} 
      - SUBDOMAINS=${MY_SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}
      - UPDATE_IP=both
      - LOG_FILE=false
      - TZ=${TZ}
    restart: unless-stopped
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    ports:
      - '${SUBDOMAIN_PORT}:80'
      - '${SSL_PORT}:443'
      - '${NGINX_PROXY_PORT}:81'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
  p2p-tracker:
    build: 
      context: .
      dockerfile: Dockerfile.tracker
    ports:
      - "${TRACKER_PORT}:8000"
    restart: unless-stopped
#  cloudflare-tunnel: # For mobile server spin up
#    image: cloudflare/cloudflared:latest
#    command: tunnel --url http://web-server:8080
#    depends_on:
#      - web-server
#    restart: unless-stopped
  watch-party-worker:
    build: ./watch-party-worker
    ports:
      - "${WORKER_UPLOAD_PORT}:8081"
    volumes:
      - ${UNCOMPRESSED_MEDIA_FOLDER}:/uncompressed
      - ${COMPRESSED_MEDIA_FOLDER}:/compressed
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]