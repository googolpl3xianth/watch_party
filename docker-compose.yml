services:
  web-server:
    image: nginxinc/nginx-unprivileged:alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./infra/nginx/nginx.template.conf:/tmp/nginx.template.conf:ro
      - ./auth:/etc/nginx/auth:ro 
      - ${COMPRESSED_MEDIA_FOLDER}:/media/compressed:ro
    environment:
      - WORKER_IP=${WORKER_IP}
    networks:
      - proxy-net
      - default
    security_opt:
      - no-new-privileges:true
    depends_on:
      - sync-server
    restart: unless-stopped
    command: >
      /bin/sh -c "envsubst '$$WORKER_IP' < /tmp/nginx.template.conf > /tmp/nginx.conf && nginx -c /tmp/nginx.conf -g 'daemon off;'"
  sync-server:
    build: ./backend
    ports:
      - "${SERVER_IP}:3000:3000"
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${COMPRESSED_MEDIA_FOLDER}:/media/compressed
    environment:
      - UPLOAD_KEY=${UPLOAD_KEY}
      - PGHOST=db
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASS}
      - PGDATABASE=${WATCHPARTYDB}
      - PGPORT=${POSTGRES_PORT}
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:15-alpine
    ports:
      - ${POSTGRES_PORT}:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASS}
      - POSTGRES_DB=${WATCHPARTYDB}
    volumes:
      - ./data/pg-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${WATCHPARTYDB}"]
      interval: 3s
      timeout: 3s
      retries: 5
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    profiles: [""] 
    ports:
        - '${SUBDOMAIN_PORT}:80'
        - '${SSL_PORT}:443'
        - '${NGINX_PROXY_PORT}:81'
    volumes:
      - ./data/proxy-data/data:/data
      - ./data/proxy-data/letsencrypt:/etc/letsencrypt
    networks:
        - proxy-net
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    profiles: [""] 
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=${PUID} 
      - PGID=${PGID} 
      - SUBDOMAINS=${MY_SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}
      - UPDATE_IP=both
      - LOG_FILE=false
      - TZ=${TZ}
    restart: unless-stopped
  p2p-tracker:
    build: 
      context: ./tracker
      dockerfile: Dockerfile.tracker
    restart: unless-stopped
  worker:
    build: ./worker
    profiles: ["worker"]
    ports:
      - "${WORKER_IP}:8081:8081"
    volumes:
      - ${COMPRESSED_MEDIA_FOLDER}:/compressed
      - ${UNCOMPRESSED_MEDIA_FOLDER}:/uncompressed
    environment:
      - UPLOAD_KEY=${UPLOAD_KEY}
      - SERVER_IP=${SERVER_IP}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video, utility]

  cloudflare-tunnel: # For mobile server spin up
    image: cloudflare/cloudflared:latest 
    profiles: ["mobile"]
    command: tunnel --url http://web-server:8080
    depends_on:
      - web-server
    restart: unless-stopped

volumes:
  remote_compressed:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},vers=3.0"
      device: "//${SERVER_IP}/compressed"

networks:
  proxy-net:
    external: true