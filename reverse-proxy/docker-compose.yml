services:
  nginx-proxy-manager:
      image: 'jc21/nginx-proxy-manager:latest'
      ports:
        - '${SUBDOMAIN_PORT}:80'
        - '${SSL_PORT}:443'
        - '${NGINX_PROXY_PORT}:81'
      volumes:
        - ./data:/data
        - ./letsencrypt:/etc/letsencrypt
      networks:
        - proxy-net

networks:
  proxy-net:
    external: true