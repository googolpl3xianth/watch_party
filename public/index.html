<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watch Party</title>
    <link rel="stylesheet" href="style.css?v=5">
    <link rel="apple-touch-icon" sizes="180x180" href="./img/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./img/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./img/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest" crossorigin="use-credentials">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('room')) {
            document.documentElement.classList.add('direct-join');
        }
    </script>
    <style>
        html.direct-join #lobby {
            display: none !important;
        }
        html.direct-join #page-loader {
            display: block !important;
            position: fixed; /* Locks it to the entire screen, not just the body height */
        }
    </style>
</head>
<body>
    <span id="page-loader" class="loader"></span>

    <div id="lobby">
        <h1>Watch Party</h1>
        <div class="lobby-card">
            <button onclick="createRoom()" class="primary-btn">Create New Room</button>
            
            <div class="divider">
                <span>OR</span>
            </div>
            
            <div class="join-box">
                <input type="text" id="room-code-input" placeholder="Room Code" autocomplete="off" maxlength="8">
                <button onclick="joinManualRoom()" class="secondary-btn">Join</button>
            </div>
        </div>
    </div>

    <div id="room-interface">
        <div id="room-title">
            <h2 id="room-display"></h2>
            <button onclick="getRoomLink()" class="clean-btn">
                <img src="./img/link.svg" alt="link" width="24" height="24">
            </button>
        </div>

        <div id="room-header">
            <button id="home-btn" onclick="goHome()">
                <img src="./img/home.svg" alt="home" width="24" height="24">
            </button>
            <h4 id="username">Name: </h4>
            <button id="edit-name-btn" onclick="rename()" class="clean-btn">
                <img src="./img/edit.svg" alt="edit" width="24" height="24">
            </button>
        </div>

        <div id="sidebar-wrapper">
            <div class="users">
                <button id="user-count-btn" onclick="getUserList()">
                    <img src="./img/users.svg" alt="users" width="24" height="24">
                    <span id="user-count-text">0</span>
                </button>
                <div id="user-list" class="user-list"></div>
            </div>
        </div>

		<div id="userMenu" class="context-menu">
            <a id="change-role-btn" class="perms-only" onclick="getRoleList(event)">change permissions</a>
            <a id="rename-btn" onclick="rename()">rename</a>
            
            <div id="role-menu" class="context-menu">
                <a onclick="submitRoleChange('host')" class="host-only">host</a>
                <a onclick="submitRoleChange('admin')" class="host-only">admin</a>
                <a onclick="submitRoleChange('guest')">guest</a>
            </div>
        </div>

        <div id="media-controls" class="perms-only">
            <label for="video-select">Select Video:</label>
            <select id="video-select">
                <option value="">-- Select a Video --</option>
            </select>
            <button onclick="requestChange()">Load for Everyone</button>
        </div>

        <h3 id="video-title"></h3>

        <p id="room-status" class="guest-only">Waiting on Host to load video</p>

        <div id="join-gate">
            <button id="join-btn">Join & Sync</button>
        </div>

        <div id="video-wrapper">
            <span id="video-loader" class="loader"></span>

            <video id="myVideo" playsinline controls crossorigin="anonymous" preload="auto"></video>

            <button id = "screen-play-btn" onclick="togglePlay()" class="perms-only"></button>

            <div id="custom-controls" class="video-overlay">
                
                <button onclick="togglePlay()" class="control-btn perms-only">
                    <img id="play-pause-icon" src="./img/pause.svg" alt="pause" width="24" height="24">
                </button>

                <button onclick="sync()" class="control-btn">
                    <img id="sync-icon" src="./img/refresh.svg" alt="pause" width="24" height="24">
                </button>

                <button onclick="toggleMute()" class="control-btn">
                    <img id="mute-icon" src="./img/volume.svg" alt="volume" width="24" height="24">
                </button>
                <input  type="range" style="accent-color: #ffffff" min="0" max="1" step="0.1" value="1" oninput="setVolume(this.value)">

                <span id="time-display" class="time-text">00:00 / 00:00</span>

                <div class="progress-container">
                    <div id="progress-bar" class="progress-filled"></div>
                </div>

                <button onclick="toggleSubtitles()" class="control-btn" id="cc-btn" style="display: none;">
                    <img id="cc-icon" src="./img/closed-caption-filled.svg" alt="closed-caption" width="24" height="24">
                </button>

                <select id="quality-selector" class="control-btn" style="display: none;">
                    <option value="-1">Auto</option>
                </select>

                <button onclick="toggleFullscreen()" class="control-btn">
                    <img src="./img/fullscreen.svg" alt="Fullscreen" width="24" height="24">
                </button>
            </div>
        </div>
    </div>
    </body>
</html>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const roomId = urlParams.get('room');
    const socket = io({secure: true,
					   transports: ['websocket'] });
    const lobbyDiv = document.getElementById('lobby');
    const roomCodeInput = document.getElementById('room-code-input');
    const roomDiv = document.getElementById('room-interface');
    const roomDisplay = document.getElementById('room-display');
    const usernameHeader = document.getElementById('username');
    const videoSelect = document.getElementById('video-select');
	const title = document.getElementById('video-title');
    const userList = document.getElementById('user-list');
    const userMenu = document.getElementById('userMenu');
	const userCountBtn = document.getElementById('user-count-btn');
    const userCountText = document.getElementById('user-count-text');
    const roleMenu = document.getElementById('role-menu');
    const roomStatus = document.getElementById('room-status')
	const joinGate = document.getElementById('join-gate');
    const joinBtn = document.getElementById('join-btn');
    const video = document.getElementById('myVideo');
    const videoLoader = document.getElementById('video-loader');
	const wrapper = document.getElementById('video-wrapper');
	const controls = document.querySelector('.video-overlay');
	const progressBar = document.getElementById('progress-bar');
	const progressContainer = document.querySelector('.progress-container');
	const timeDisplay = document.getElementById('time-display');
	const playPauseIcon = document.getElementById('play-pause-icon');
    const ccIcon = document.getElementById('cc-icon');
    const ccBtn = document.getElementById('cc-btn');
    const muteBtn = document.getElementById('mute-icon');
	

	let mousedown = false;
	let wasPlayingBeforeScrub = false;
	let logicInitialized = false;
	let sync_perm = false;
    let isHost = false;
	let hasJoined = false;
	let hls = null;
	let currentVideoFilename = "";
    let usersArray = [];

    setupUI(socket);

    // --- ROOM MANAGEMENT ---
    function createRoom() {
        socket.emit('request-create-room');
    }

    if (roomCodeInput) {
        roomCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') joinManualRoom();
        });
    }

    function joinManualRoom(){
        const input = document.getElementById('room-code-input');
        const code = input.value.trim().toLowerCase(); 
        
        if (code.length > 0) {
            window.location.search = `?room=${code}`;
        } else {
            input.style.borderColor = "red";
            setTimeout(() => input.style.borderColor = "#333", 1000);
        }
    }

    socket.on('room-created', (newId) => {
        window.location.search = `?room=${newId}`;
    });

    if (roomId) {
        socket.emit('join-room', roomId);

        socket.on('join-success', (permission) => {
            document.documentElement.classList.remove('direct-join');
            lobbyDiv.style.display = 'none';
            roomDiv.style.display = 'block';
            roomDisplay.innerText = `Room ID: ${roomId}`;

			const permElements = document.querySelectorAll('.perms-only');
            const hostElements = document.querySelectorAll('.host-only');
            const guestElements = document.querySelectorAll('.guest-only');
            isHost = (permission === 'host');
			sync_perm = (permission === 'host' || permission === 'admin');
            if(isHost){
                hostElements.forEach(el => {
                    el.classList.add('show-host');
                    el.style.setProperty('display', 'block', 'important');
                });
            }
            else{
                hostElements.forEach(el => el.style.display = 'none');
            }
			if (sync_perm) {
                guestElements.forEach(el => el.style.display = 'none');
				permElements.forEach(el => {
					el.classList.add('show-perms');
					el.style.setProperty('display', 'block', 'important');
				});
				progressContainer.classList.add('mouse-interact');
				console.log("Privileged permissions activated: showing controls.");
			}
			else{
                guestElements.forEach(el => {
                    el.classList.add('show-guest');
                    el.style.setProperty('display', 'block', 'important');
                });
				permElements.forEach(el => el.style.display = 'none');
			}
			console.log("Reqesting to load video");
			socket.emit('request-load-video');
            setupSocketLogic(socket); 
        });

        socket.on('join-error', (msg) => {
            alert(msg);
            window.location.search = ""; // Redirect back to lobby
        });
    } else {
        // We are in the lobby
        lobbyDiv.style.display = 'flex';
        roomDiv.style.display = 'none';
    }

	function setupUI(socket){
		socket.on('video-list', (files) => {
			videoSelect.innerHTML = '<option value="">-- Select a Video --</option>'; // Reset
			files.forEach(file => {
				const option = document.createElement('option');
				option.value = file;
				option.textContent = file;
				videoSelect.appendChild(option);
			});
		});

        socket.on('get-video-status', (data) =>{
            socket.emit('host-video-status', {
                requesterId: data.requesterId, 
                time: video.currentTime,
                paused: video.paused
            });
        })

		socket.on('update-user-list', (usersData) => {
            if (!usersData) return;

            usersArray = usersData;
            tempList = Object.entries(usersArray);

			if(tempList.length > 99){
				userCountText.innerText = `99+`;
			}
			else{
				userCountText.innerText = `${tempList.length}`;
			}

            const activeSocketIds = new Set();

            for (const [socketId, userDetails] of Object.entries(usersArray)) {
                activeSocketIds.add(socketId); 
                
                const targetName = userDetails.username || 'Guest';
                const targetRole = userDetails.role || 'guest';
                let displayText = `${targetName} (${targetRole})`;
                if(socketId === socket.id){ displayText += ' *'; usernameHeader.innerText = `Name: ${targetName}`;}

                let userDiv = userList.querySelector(`.user-item[data-id="${socketId}"]`);

                if (userDiv) {
                    userDiv.innerText = displayText;
                } else {
                    userDiv = document.createElement('div');
                    userDiv.classList.add('user-item'); 
                    userDiv.dataset.id = socketId; 
                    userDiv.innerText = displayText; 
                    
                    userDiv.style.cursor = "default";

                    userList.appendChild(userDiv);
                }
            };
		});

        socket.on('user-left', (disconnectedSocketId) => {
            const ghostElement = userList.querySelector(`.user-item[data-id="${disconnectedSocketId}"]`);
            
            if (ghostElement) {
                ghostElement.remove();
                
                const currentCount = parseInt(userCountText.innerText.replace('+', '')) - 1;

                if(currentCount > 99){
                    userCountText.innerText = `99+`;
                }
                else{
                    userCountText.innerText = `${currentCount}`;
                }
            }
        });

		userList.addEventListener('contextmenu', (e) => {
            if (e.target.classList.contains('user-item')) {
                e.preventDefault(); 
                
                const targetSocketId = e.target.getAttribute('data-id');
                userMenu.setAttribute('data-target-id', targetSocketId);

                const renameBtn = document.getElementById('rename-btn');
                const changeRoleBtn = document.getElementById('change-role-btn');
                if (targetSocketId === socket.id || sync_perm) {
                    renameBtn.style.display = 'block';
                } else {
                    renameBtn.style.display = 'none';
                }
                if ((targetSocketId === socket.id && sync_perm) || isHost) {
                    console.log(`${isHost}`);
                    changeRoleBtn.style.display = 'block';
                } else {
                    changeRoleBtn.style.display = 'none';
                    console.log(`${changeRoleBtn.style.display}`);
                }

                userMenu.classList.add('visible');

                const menuWidth = userMenu.offsetWidth;
                const menuHeight = userMenu.offsetHeight;

                let posX = e.clientX;
                let posY = e.clientY;

                if (posX + menuWidth > window.innerWidth) {
                    posX = posX - menuWidth;
                }

                if (posY + menuHeight > window.innerHeight) {
                    posY = posY - menuHeight;
                }

                userMenu.style.left = `${posX}px`;
                userMenu.style.top = `${posY}px`;
            }
        });

		document.addEventListener('click', (e) => {
            if (!userMenu.contains(e.target)) {
                userMenu.classList.remove('visible');
                roleMenu.style.display = 'none';
                if(!userCountBtn.contains(e.target) && !userList.contains(e.target) && userList.style.display === 'block'){
                    userList.style.display = 'none';
                }
            }
        });
	}

    function setupSocketLogic(socket) {
		if (logicInitialized) {
			// Update the internal permission variable if your logic uses one
			return; 
		}
		logicInitialized = true;
		let idleTimer;
		video.controls = false;


        // Prevent outside control updates
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => {
                if (sync_perm) togglePlay();
                else socket.emit('request-sync'); // Guest just snaps back to host
            });
            
            navigator.mediaSession.setActionHandler('pause', () => {
                if (sync_perm) togglePlay();
                else socket.emit('request-sync');
            });

            navigator.mediaSession.setActionHandler('seekbackward', () => {
                if (sync_perm) {
                    video.currentTime -= 5;
                    emitSync('seeking', video.currentTime);
                } else socket.emit('request-sync');
            });

            navigator.mediaSession.setActionHandler('seekforward', () => {
                if (sync_perm) {
                    video.currentTime += 5;
                    emitSync('seeking', video.currentTime);
                } else socket.emit('request-sync');
            });
        }

        joinBtn.onclick = async () => {
			hasJoined = true;	
            joinGate.style.display = 'none';
			wrapper.style.display = 'flex';
			video.style.display = 'block';
    		controls.style.display = 'flex';

			video.muted = false;
			
            if (video.currentSrc || video.src) {
                video.play().catch(e => {
                    if (e.name !== 'AbortError') {
                        console.log("Unmuted playback blocked. Falling back to muted...");
                        video.muted = true;
                        video.play().catch(err => console.log("Fallback play failed", err));
                    }
                });
            } else {
                console.log("Waiting for HLS to inject the blob URL...");
            }

            console.log("Audio context unlocked safely.");
            socket.emit('request-sync');
        };
        
        // State Guards
        let isBufferingLocal = false;
        let internalChange = false;
        let syncLockTimer = null; 
        let pendingPlayListener = null;
        let lastOutboundTime = 0;
        let lastThrottleEmit = 0;
        const SYNC_THRESHOLD = 1.5; // Slightly higher for mobile stability

        // Helper to send events and mark the time we sent them
        const emitSync = (type, time) => {
            if (!sync_perm) return;
            lastOutboundTime = Date.now();
            socket.emit('sync-event', { type, time });
        };

        // --- 1. OUTBOUND: Host Interaction ---
		video.addEventListener('play', () => {
			if (internalChange) return;
			if (!sync_perm) { socket.emit('request-sync'); }
			else{ emitSync('play', video.currentTime); }
		});

		video.addEventListener('pause', () => {
			if (internalChange) return;
			if (!sync_perm) { socket.emit('request-sync'); }
			else{ emitSync('pause', video.currentTime);}
		});

		video.addEventListener('seeked', () => {
            if (internalChange) return; 
            if (!sync_perm) socket.emit('request-sync');
            else emitSync('seeked', video.currentTime);
        });

		progressContainer.addEventListener('mousedown', (e) => {
			if(!sync_perm) return;
			mousedown = true;
			wasPlayingBeforeScrub = !video.paused;
			video.pause();
			emitSync('pause', video.currentTime);
			scrub(e);
		});

		window.addEventListener('mouseup', () => {
			if (sync_perm && mousedown) {
				mousedown = false;
				if(wasPlayingBeforeScrub) {
					video.play(); 
					emitSync('play', video.currentTime);
				}
				else{
					emitSync('pause', video.currentTime);
				}
			}
		});
		window.addEventListener('mousemove', (e) => {
			if (sync_perm && mousedown){
				scrub(e);
				const now = Date.now();
				if (now - lastThrottleEmit > 150) { 
					emitSync('seeking', video.currentTime);
					lastThrottleEmit = now;
				}
			}
		});

		setInterval(() => {
			if (isHost && !video.paused && !internalChange) {
				emitSync('heartbeat', video.currentTime);
			}
		}, 3000);

        // --- 2. INBOUND: Everyone ---
		socket.on('load-new-video', (filename) => {
            roomStatus.classList.remove('show-guest');
            roomStatus.style.setProperty('display', 'none', 'important');
            if (currentVideoFilename === filename || !filename){
				filename ? console.log("File already loaded", filename) : console.log("No file to load", filename);
			}
            currentVideoFilename = filename;
            console.log("Switching to:", filename);
            
            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (!hasJoined) {
                joinGate.style.display = 'flex';
                joinBtn.style.display = 'flex';
                roomStatus.classList.remove('show-guest');
                wrapper.style.display = 'none';
            }

            let webSafePath = filename.split('\\').join('/');
            webSafePath = webSafePath.split('/').map(encodeURIComponent).join('/');
            const videoUrl = `/media/${webSafePath}`;

			video.innerHTML = '';
			const ccBtn = document.getElementById('cc-btn');
            ccBtn.style.display = 'none';

			document.getElementById('quality-selector').style.display = 'none';

            const basePath = videoUrl.substring(0, videoUrl.lastIndexOf('/'));
            const track = document.createElement('track');
            track.kind = 'subtitles';
            track.label = 'English';
            track.srclang = 'en';
            track.src = `${basePath}/subtitles.vtt`;
            track.default = true;
            video.appendChild(track);

			track.addEventListener('load', () => {
                const textTracks = video.textTracks;
                if (textTracks.length > 0) {
                    textTracks[0].mode = 'showing';
                    ccBtn.style.display = 'block';
                    ccBtn.style.color = "#ff0000"; 
                    ccBtn.style.opacity = "1";
                }
            });

			track.addEventListener('error', () => {
                console.log("No subtitles found for this video. Hiding CC button.");
                ccBtn.style.display = 'none';
            });

            if (filename.endsWith('.m3u8')) {
                video.removeAttribute('src'); 

                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    const savedQuality = localStorage.getItem('hlsQuality');
                    let initialStartLevel = -1; 

                    if (savedQuality !== null) {
                        initialStartLevel = parseInt(savedQuality);
                    }

                    hls = new Hls({
                        startLevel: initialStartLevel, 
                        capLevelToPlayerSize: true,
                        maxBufferLength: 60, 
                        maxMaxBufferLength: 90,
                        abrEwmaDefaultEstimate: 500000, 
                        abrBandWidthFactor: 0.6, 
                        maxStarvationDelay: 2,
                        enableWorker: true
                    });
                    
                    hls.loadSource(videoUrl);
                    hls.attachMedia(video);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        console.log("HLS Manifest Parsed & Ready");
                        
                        const qualitySelector = document.getElementById('quality-selector');
                        qualitySelector.style.display = 'inline-block';
                        qualitySelector.innerHTML = '<option value="-1" style="color: black;">Auto</option>'; 
                        
                        hls.levels.forEach((level, index) => {
                            const option = document.createElement('option');
                            option.value = index; 

							let labelName = `${level.height}p`; // Fallback
                            if (level.width === 1920) labelName = "1080p";
                            else if (level.width === 1280) labelName = "720p";
                            else if (level.width === 854) labelName = "480p";

                            option.textContent = labelName; 
                            option.style.color = 'black'; 
                            qualitySelector.appendChild(option);
                        });

                        if (savedQuality !== null) {
                            qualitySelector.value = savedQuality;
                            hls.currentLevel = parseInt(savedQuality); 
                        }

                        qualitySelector.addEventListener('change', (e) => {
                            const newLevel = parseInt(e.target.value);
                            hls.currentLevel = newLevel; 
                            
                            localStorage.setItem('hlsQuality', newLevel);
                            
                            console.log(newLevel === -1 ? "Quality: Auto" : `Quality forced to: ${hls.levels[newLevel].height}p`);
                        });

                        if (hasJoined) {
                            if (video.currentSrc || video.src) {
                                video.play().catch(e => console.log("HLS Autoplay blocked:", e));
                            }
                        }
                    });

                    hls.on(Hls.Events.LEVEL_SWITCHED, function(event, data) {
                        const activeLevel = hls.levels[data.level];
                        const currentHeight = activeLevel.height;
                        
                        console.log(`[HLS] Seamlessly switched to: ${currentHeight}p`);

                        const qualitySelector = document.getElementById('quality-selector');
                        
                        if (qualitySelector.value === "-1") {
                            const autoOption = qualitySelector.querySelector('option[value="-1"]');
                            if (autoOption) {
                                autoOption.textContent = `Auto (${currentHeight}p)`;
                            }
                        }
                    });
                    
                    hls.on(Hls.Events.ERROR, function (event, data) {
                        if (data.fatal) {
                            switch (data.type) {
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    console.warn("Fatal media error encountered, trying to recover...", data);
                                    hls.recoverMediaError(); // Tell HLS.js to flush the buffer and try again
                                    break;
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    console.error("Fatal network error encountered", data);
                                    hls.startLoad(); // Try to fetch the chunk again
                                    break;
                                default:
                                    console.error("Unrecoverable fatal error. Destroying player.", data);
                                    hls.destroy();
                                    break;
                            }
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoUrl;
                    video.addEventListener('loadedmetadata', function() {
                        if (hasJoined) video.play().catch(e => console.log("Apple Autoplay blocked:", e));
                    }, { once: true });
                }
            } else {
                // --- MP4 LOGIC ---
				video.src = videoUrl;
				video.load(); 
				if (hasJoined) {
					video.play().catch(e => {
						if (e.name !== 'AbortError') {
							console.log("MP4 Autoplay blocked:", e);
						}
					});
				}
			}
			if(currentVideoFilename.endsWith(".m3u8")){
				title.innerText  = currentVideoFilename.split('/')[0];
			}
			else{
				title.innerText = currentVideoFilename.split('.')[0];
			}
        });

		video.addEventListener('play', () => {
			playPauseIcon.src = "./img/pause.svg";
            playPauseIcon.alt = "pause";
		});

		video.addEventListener('pause', () => {
			playPauseIcon.src = "./img/play.svg";
            playPauseIcon.alt = "play";
		});

		window.addEventListener('keydown', (e) => {
			// Prevent scrolling when pressing space or arrows
			if ([" ", "ArrowLeft", "ArrowRight"].includes(e.key)) {
				e.preventDefault();
			}

			// Only allow the Host to skip ahead/back
			if(sync_perm){
				if (e.key === " " || e.code === "Space") {
					togglePlay();
				} else if (e.key === "ArrowRight") {
					video.currentTime += 5; // Skip 5 seconds
					emitSync('seeking', video.currentTime);
				} else if (e.key === "ArrowLeft") {
					video.currentTime -= 5;
					emitSync('seeking', video.currentTime);
				}
			}
			if (e.key === "f"){
				toggleFullscreen();
			}
			else if(e.key === "m"){
				toggleMute();
			}
			else if(e.key === "c"){
				toggleSubtitles();
			}
		});

        video.addEventListener('waiting', () => {
            if (!isBufferingLocal) {
                isBufferingLocal = true;
                videoLoader.classList.add('visible');
                console.log("[Player] Buffering... showing loader.");
                if (hasJoined) socket.emit('client-buffering');
            }
        });

        video.addEventListener('playing', () => {
            if (isBufferingLocal) {
                isBufferingLocal = false;
                videoLoader.classList.remove('visible');
                console.log("[Player] Recovered! Hiding loader.");
                if (hasJoined) socket.emit('client-recovered');
            }
        });

		video.addEventListener('timeupdate', () => {
			if (video.duration) {
				const percentage = (video.currentTime / video.duration) * 100;
				progressBar.style.width = percentage + '%';

				const current = formatTime(video.currentTime);
				const total = formatTime(video.duration);
				timeDisplay.innerText = `${current} / ${total}`;
			}
		});

		socket.on('switch-permission', (targetSocketID, newUsername, newRole) => {
            console.log("Received switch-permission from server for:", targetSocketID, newRole);
            if(!targetSocketID) { targetSocketID = socket.id; }
            
            if (usersArray[targetSocketID]) {
                if (newUsername) usersArray[targetSocketID].username = newUsername;
                if (newRole) usersArray[targetSocketID].role = newRole;
            }

            let userDiv = userList.querySelector(`.user-item[data-id="${targetSocketID}"]`);
            if (userDiv && usersArray[targetSocketID]) {
                let displayText = `${usersArray[targetSocketID].username} (${usersArray[targetSocketID].role})`;
                if (targetSocketID === socket.id) { displayText += ' *'; }
                usernameHeader.innerText = `Name: ${usersArray[targetSocketID].username}`
                userDiv.innerText = displayText;
            }

            if (targetSocketID === socket.id) {
                const myConfirmedRole = usersArray[targetSocketID].role;
                const hostElements = document.querySelectorAll('.host-only');
                const permElements = document.querySelectorAll('.perms-only');
                const guestElements = document.querySelectorAll('.guest-only');
                isHost = (myConfirmedRole === 'host');
                sync_perm = (myConfirmedRole === 'host' || myConfirmedRole === 'admin');
                
                if(isHost){
                    hostElements.forEach(el => {
                        el.classList.add('show-host');
                        el.style.setProperty('display', 'block', 'important');
                    });
                }
                else{
                    hostElements.forEach(el => {
                        el.classList.remove('show-host');
                        el.style.setProperty('display', 'none', 'important');
                    });
                }

                if (sync_perm) {
                    if(isHost){
                        hostElements.forEach(el => {
                            el.classList.add('show-host');
                            el.style.setProperty('display', 'block', 'important');
                        });
                    }
                    guestElements.forEach(el => {
                        el.classList.remove('show-guest');
                        el.style.setProperty('display', 'none', 'important');
                    });
                    permElements.forEach(el => {
                        el.classList.add('show-perms');
                        el.style.setProperty('display', 'block', 'important');
                    });
                    progressContainer.classList.add('mouse-interact');
                    console.log("I am now a host. Controls unlocked.");
                } else {
                    guestElements.forEach(el => {
                        el.classList.add('show-guest');
                        el.style.setProperty('display', 'block', 'important');
                    });
                    permElements.forEach(el => {
                        el.classList.remove('show-perms');
                        el.style.setProperty('display', 'none', 'important');
                    });
                    progressContainer.classList.remove('mouse-interact');
                    console.log("I am now a guest. Controls locked.");
                }
            }
        });

        socket.on('apply-sync', (data) => {
            const now = Date.now();
            if (now - lastOutboundTime < 500 && data.type === 'heartbeat') return;
            if (now - lastOutboundTime < 200) return; // Minimum "cool down" to prevent loops

            const timeDiff = Math.abs(video.currentTime - data.time);

            if (data.type !== 'heartbeat' || timeDiff > SYNC_THRESHOLD) {
                if (video.readyState >= 1) { 
                    executeSync(data);
                } else {
                    video.addEventListener('loadedmetadata', () => executeSync(data), { once: true });
                }
            }
        });

        socket.on('force-pause-room', (bufferingUserId) => {
            console.log(`User ${bufferingUserId} is buffering. Auto-pausing...`);
            internalChange = true; 
            video.pause();
            setTimeout(() => { internalChange = false; }, 300);
            videoLoader.classList.add('visible');
        });

        socket.on('resume-room', () => {
            console.log("Everyone caught up. Auto-resuming...");
            internalChange = true;
            video.play().catch(e => console.log("Auto-resume blocked:", e));
            setTimeout(() => { internalChange = false; }, 300);
            videoLoader.classList.remove('visible');
        });

        function executeSync(data) {
            internalChange = true;
            if (syncLockTimer) clearTimeout(syncLockTimer);

            if (pendingPlayListener) {
                video.removeEventListener('canplay', pendingPlayListener);
                pendingPlayListener = null;
            }

            const needsSeek = Math.abs(video.currentTime - data.time) > 0.1;

            if (needsSeek) {
                if (video.readyState >= 1) {
                    video.currentTime = data.time;
                } else {
                    video.addEventListener('loadedmetadata', () => {
                        video.currentTime = data.time;
                    }, { once: true });
                }

                video.addEventListener('seeked', () => {
                    if (syncLockTimer) clearTimeout(syncLockTimer);
                    syncLockTimer = setTimeout(() => { internalChange = false; }, 100);
                }, { once: true });
            }
            
            if (data.type === 'play') {
                if (video.readyState >= 3) {
                    video.play().catch(e => console.log("Playback failed:", e));
                } else {
                    pendingPlayListener = () => {
                        internalChange = true; 
                        if (syncLockTimer) clearTimeout(syncLockTimer);

                        video.play().catch(e => console.log("Delayed play failed:", e));
                        
                        syncLockTimer = setTimeout(() => { internalChange = false; }, 300);
                        pendingPlayListener = null;
                    };
                    video.addEventListener('canplay', pendingPlayListener, { once: true });
                }
            } else if (data.type === 'pause') {
                video.pause();
            }

            if (!needsSeek) {
                syncLockTimer = setTimeout(() => { internalChange = false; }, 300);
            }
        }

		function resetIdleTimer() {
			wrapper.classList.remove('is-idle');

            clearTimeout(idleTimer);

            idleTimer = setTimeout(() => {
                if (!video.paused) {
                    wrapper.classList.add('is-idle');
                }
            }, 2000);
		}

		wrapper.addEventListener('mousemove', resetIdleTimer);
        wrapper.addEventListener('mousedown', resetIdleTimer);
        wrapper.addEventListener('keydown', resetIdleTimer);
        
        wrapper.addEventListener('fullscreenchange', resetIdleTimer);
        wrapper.addEventListener('webkitfullscreenchange', resetIdleTimer);
    }

    function goHome(){
        window.location.search = "";
    }

    function getRoomLink(){
        const text = document.URL;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text)
            .then(() => {
                console.log('Text copied to clipboard successfully!');
            })
            .catch(err => {
                console.error('Could not copy text: ', err);
            });
        } else {
            console.error('Clipboard API not supported');
        }
    }

	function getUserList() {
		if (userList.style.display === 'block') {
            userList.style.display = 'none';
        } else {
            userList.style.display = 'block';
        }
	}

    function getRoleList(e) {
        e.stopPropagation();
        if (roleMenu.style.display === 'block') {
            roleMenu.style.display = 'none';
        } else {
            roleMenu.style.display = 'block';
        }
    }

    function submitRoleChange(newRole) {
        const targetId = userMenu.getAttribute('data-target-id'); 
        
        console.log("Sending permission change to server for User:", targetId, "New Role:", newRole);
        
        updateUser(targetId, null, newRole);
        
        roleMenu.style.display = 'none';
        userMenu.classList.remove('visible');
    }

    function rename(){
        let username = window.prompt("What's your username?");
        if (username) {
            usernameHeader.innerText = `Name: ${username}`;
            updateUser(socket.id, username, null); // Always update your own name
        }
        userMenu.classList.remove('visible');
    }

    function updateUser(targetId=null, username=null, role=null){
        socket.emit('request-user-change', targetId, username, role);
    }

	function requestChange() {
		const selectedFile = videoSelect.value;
		if (selectedFile) {
			socket.emit('request-video-change', selectedFile);
		}
	}

	// Video Custom Controls
    function sync(){
        socket.emit('request-sync');
    }
    function toggleFullscreen() {
        if (wrapper.requestFullscreen) { // Standard Web Fullscreen (Desktop, Android, iPad)
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
		} else if (wrapper.webkitRequestFullscreen) { // Older WebKit fallback (Older Desktop/Android)
			if (!document.webkitFullscreenElement) {
                wrapper.webkitRequestFullscreen();
            } else {
                document.webkitExitFullscreen();
            }
		} else if (video.webkitEnterFullscreen) { // Older iPhones
			video.webkitEnterFullscreen(); 
		}
    }

    function toggleMute(){
        video.muted = !video.muted;
        if(video.muted){
            muteBtn.src = './img/volume-silence.svg';
        } else{
            muteBtn.src = './img/volume.svg';
        }
    }

	function toggleSubtitles() {
        const textTracks = video.textTracks;
        
        if (textTracks.length > 0) {
            const track = textTracks[0];
            
            if (track.mode === 'showing') {
                track.mode = 'hidden';
                ccIcon.src = "./img/closed-caption.svg"
                ccBtn.style.opacity = "0.5";     
            } 
            // If they are OFF, turn them ON
            else {
                track.mode = 'showing';
                ccIcon.src = "./img/closed-caption-filled.svg"
                ccBtn.style.opacity = "1"; 
                     
            }
        }
    }

    function setVolume(val) {
        video.volume = val;
    }

	function togglePlay() {
		if (!sync_perm) {
			console.log("Guests cannot control playback.");
			return;
		}
		if (video.paused) {
			video.play();
		} else {
			video.pause();
		}
	}

	function scrub(e) {
		const rect = progressContainer.getBoundingClientRect();
		const x = e.clientX - rect.left;
		const scrubTime = (x / progressContainer.offsetWidth) * video.duration;
		
		if (!isNaN(scrubTime)) {
			video.currentTime = scrubTime;
		}
	}

	function formatTime(seconds) {
		const h = Math.floor(seconds / 3600);
		const m = Math.floor((seconds % 3600) / 60);
		const s = Math.floor(seconds % 60);
		
		const parts = [
			h > 0 ? h : null,
			(h > 0 && m < 10 ? "0" : "") + m,
			(s < 10 ? "0" : "") + s
		].filter(p => p !== null);
		
		return parts.join(":");
	}
</script>
